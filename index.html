<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flora.is-a.dev</title>
    <meta
      name="description"
      content="Placeholder personal site for flora.is-a.dev."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe6;
        --panel: rgba(255, 252, 247, 0.82);
        --text: #1e1b18;
        --muted: #665f58;
        --accent: #bd4f27;
        --accent-soft: #f4c9a8;
        --border: rgba(30, 27, 24, 0.08);
        --shadow: 0 18px 45px rgba(90, 55, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(244, 201, 168, 0.85), transparent 36%),
          radial-gradient(circle at bottom right, rgba(189, 79, 39, 0.18), transparent 32%),
          linear-gradient(135deg, #f8f3ea, var(--bg));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 48px 28px;
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        margin: 0 0 16px;
        font: 600 0.82rem/1.2 Arial, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 8vw, 5rem);
        line-height: 0.95;
      }

      p {
        margin: 18px 0 0;
        max-width: 42rem;
        font-size: 1.08rem;
        line-height: 1.75;
        color: var(--muted);
      }

      .card {
        margin-top: 28px;
        padding: 18px 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(30, 27, 24, 0.06);
      }

      .card strong {
        color: var(--text);
      }

      a {
        color: var(--accent);
      }

      @media (max-width: 640px) {
        main {
          padding: 36px 22px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Software Developer</p>
      <h1>Flora</h1>
      <p>
        This is a temporary landing page for <strong>flora.is-a.dev</strong>.
        A full personal site is being prepared and will be published here soon.
      </p>
      <div class="card">
        <strong>GitHub:</strong>
        <a href="https://github.com/sanzhangSZ">github.com/sanzhangSZ</a>
      </div>
    </main>
  </body>
</html>
